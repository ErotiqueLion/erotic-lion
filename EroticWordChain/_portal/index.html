<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Gift from the Erotic Lion — The Dark Carnival</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <!-- 最初の画像を優先プリロード -->
    <link rel="preload" as="image" href="/erotic-lion/img/TOP.webp" media="(min-width: 768px)">
    <link rel="preload" as="image" href="/erotic-lion/img/TOP_mob.webp" media="(max-width: 767px)">
    <style>
        :root {
            --bg:      #0d0008;
            --main:    #8b0000;
            --accent:  #c9a84c;
            --text:    #f0e6d3;
            --subtext: #9e8f7a;
            --border:  #3a1a1a;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Noto Serif JP', Georgia, serif;
            color: var(--text);
        }

        /* ── 共通スクリーン ── */
        .screen {
            position: fixed;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.9s ease;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 8vh;
        }
        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        /* 暗化オーバーレイ（TOP・PW のみ） */
        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(13, 0, 8, 0.45);
            pointer-events: none;
        }
        .screen > * { position: relative; z-index: 1; }

        /* ── TOP 画面（img オーバーレイ方式） ── */
        #screen-top {
            background-image: none;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 0;
        }
        #screen-top::before { display: none; }

        #top-wrap {
            position: relative;
            width: 100%;
            /* PC: 横長 2760x1504 */
            aspect-ratio: 2760 / 1504;
        }
        /* モバイル: 縦長 1536x2752 */
        @media (max-width: 767px) {
            #top-wrap { aspect-ratio: 1536 / 2752; }
        }
        #top-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        #top-overlay {
            position: absolute;
            inset: 0;
        }
        /* START THE SHOW サインに重ねる透明ボタン（PC: 赤枠実測値） */
        #btn-start {
            position: absolute;
            left: 40.22%;
            top: 81.25%;
            width: 24.17%;
            height: 5.72%;
            background: transparent;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border-color 0.35s, background 0.35s;
            -webkit-tap-highlight-color: transparent;
        }
        #btn-start:hover {
            background: rgba(201, 168, 76, 0.10);
            border-color: rgba(201, 168, 76, 0.55);
            box-shadow: 0 0 18px rgba(201, 168, 76, 0.25);
        }
        /* モバイル用ボタン位置（赤枠実測値） */
        @media (max-width: 767px) {
            #btn-start {
                left: 24.80%;
                top: 90.95%;
                width: 50.72%;
                height: 3.78%;
            }
        }
        /* Quit リンク（右下・控えめ） */
        #top-quit {
            position: absolute;
            bottom: 3%;
            right: 2.5%;
            font-family: 'Cinzel', serif;
            font-size: clamp(8px, 1.0vw, 13px);
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(158, 143, 122, 0.45);
            cursor: pointer;
            transition: color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        #top-quit:hover { color: rgba(201, 168, 76, 0.75); }

        /* ── パスワード画面（img オーバーレイ方式） ── */
        #screen-pw {
            background-image: none;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 0;
        }
        #screen-pw::before { display: none; }

        #pw-wrap {
            position: relative;
            width: 100%;
            /* PC: 横長 2760x1504 */
            aspect-ratio: 2760 / 1504;
        }
        /* モバイル: 縦長 1536x2752 */
        @media (max-width: 767px) {
            #pw-wrap { aspect-ratio: 1536 / 2752; }
        }
        #pw-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        #pw-overlay {
            position: absolute;
            inset: 0;
        }

        /* パスワード入力フィールド（PC赤枠実測） */
        #pw-input {
            position: absolute;
            left: 45.43%;
            top: 53.52%;
            width: 13.41%;
            height: 4.39%;
            background: transparent;
            border: none;
            outline: none;
            color: rgba(201, 168, 76, 0.0);
            caret-color: var(--accent);
            font-family: 'Cinzel', serif;
            font-size: clamp(10px, 1.8vw, 22px);
            letter-spacing: 0.25em;
            text-align: center;
            padding: 0;
        }

        /* エラー表示（入力欄の下） */
        #pw-error {
            position: absolute;
            left: 40%;
            top: 59%;
            width: 20%;
            font-family: 'Cinzel', serif;
            font-size: clamp(7px, 0.9vw, 11px);
            letter-spacing: 2px;
            color: #c0392b;
            text-align: center;
        }

        /* ENTER ボタン（赤枠実測: left=39.53%, top=87.63%, w=12.28%, h=5.45%） */
        #btn-enter {
            position: absolute;
            left: 39.53%;
            top: 87.63%;
            width: 12.28%;
            height: 5.45%;
            background: transparent;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        #btn-enter:hover {
            background: rgba(201, 168, 76, 0.12);
            border-color: rgba(201, 168, 76, 0.55);
        }

        /* CANCEL ボタン（PC赤枠実測） */
        #btn-cancel {
            position: absolute;
            left: 53.19%;
            top: 87.77%;
            width: 11.74%;
            height: 5.39%;
            background: transparent;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        #btn-cancel:hover {
            background: rgba(201, 168, 76, 0.08);
            border-color: rgba(158, 143, 122, 0.4);
        }

        /* ── モバイル PW 画面: 各要素の位置を上書き（赤枠実測値） ── */
        @media (max-width: 767px) {
            #pw-input {
                left: 41.34%;
                top: 52.80%;
                width: 25.98%;
                height: 2.40%;
            }
            #pw-error {
                left: 30%;
                top: 56%;
                width: 40%;
            }
            #btn-enter {
                left: 32.49%;
                top: 83.21%;
                width: 35.87%;
                height: 5.01%;
            }
            #btn-cancel {
                left: 32.42%;
                top: 89.50%;
                width: 35.74%;
                height: 4.98%;
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.45s ease; }

        /* ── ゲーム選択画面 ──
           img タグで背景を管理するため background-image は使わない */
        #screen-select {
            background-image: none;
            justify-content: flex-start;
            align-items: flex-start;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0;
        }
        /* 選択画面は img で暗化を管理するので ::before 不要 */
        #screen-select::before { display: none; }

        /* 画像全体に薄い暗化レイヤー（フレーム外の文字・装飾を抑える） */
        #select-dim {
            position: absolute;
            inset: 0;
            background: rgba(5, 2, 1, 0.45);
            pointer-events: none;
            z-index: 1;
        }

        /* カードはdimの上に表示 */
        .gcard, #select-back {
            z-index: 2;
        }


        /* ════════════════════════════════════════
           ゲーム選択画面 — img + オーバーレイ方式
           ════════════════════════════════════════ */

        /* 画像とカードを包むコンテナ（アスペクト比を明示してパーセント高さを確定） */
        #select-wrap {
            position: relative;
            width: 100%;
            flex-shrink: 0;
            /* 2760:1504 = 原画像のアスペクト比 */
            aspect-ratio: 2760 / 1504;
        }

        /* 背景画像（コンテナを満たす） */
        #select-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* カードオーバーレイ全体 */
        #select-cards {
            position: absolute;
            inset: 0;
        }

        /* 個別カード共通 */
        .gcard {
            position: absolute;
            display: flex;
            align-items: stretch;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            /* フレームの角丸に合わせる（画像の丸み ≈ 1.5% of card width） */
            border-radius: 0.8%;
        }

        /* カード位置（原画像 2760x1504 の赤枠実測値から算出） */
        #gcard-1 { top: 35.3%; left: 31.3%; width: 19.9%; height: 23.6%; }
        #gcard-2 { top: 35.1%; left: 55.2%; width: 19.5%; height: 23.6%; }
        #gcard-3 { top: 65.0%; left: 30.8%; width: 20.2%; height: 28.4%; }
        #gcard-4 { top: 64.8%; left: 55.0%; width: 21.6%; height: 28.9%; }

        /* カード内側（画像のプレースホルダーを完全に隠す） */
        .gcard-inner {
            width: 100%;
            height: 100%;
            background: rgba(8, 3, 1, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 7% 9%;
            transition: background 0.3s;
        }

        .gcard:hover .gcard-inner {
            background: rgba(22, 8, 2, 0.82);
        }

        /* ゲームタイトル（カード上部・メイン要素） */
        .gcard-title {
            font-family: 'Noto Serif JP', Georgia, serif;
            font-size: clamp(10px, 2.0vw, 24px);
            font-weight: 700;
            color: #c9a84c;
            letter-spacing: 0.06em;
            text-align: center;
            margin-bottom: 10%;
            line-height: 1.3;
            flex-shrink: 0;
        }

        .gcard:hover .gcard-title {
            color: #f0d070;
        }

        /* 説明文 */
        .gcard-desc {
            font-family: 'Noto Serif JP', Georgia, serif;
            font-size: clamp(7px, 1.2vw, 14px);
            color: #c8aa80;
            text-align: center;
            line-height: 1.7;
            margin: 0;
        }

        /* Coming Soon カード */
        .gcard-soon {
            cursor: default;
            pointer-events: none;
        }

        .gcard-coming-header {
            display: flex;
            align-items: center;
            gap: 5%;
            margin-bottom: 7%;
            font-family: 'Cinzel', serif;
            font-size: clamp(7px, 1.5vw, 17px);
            color: #7a6040;
            letter-spacing: 0.08em;
            flex-shrink: 0;
        }

        .gcard-lock {
            font-size: 0.88em;
            opacity: 0.65;
        }

        .gcard-desc-muted {
            color: #4a3820;
        }

        /* 戻るリンク */
        #select-back {
            position: absolute;
            /* 画像下端のわずか上に配置 */
            bottom: 1.5%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cinzel', serif;
            font-size: clamp(7px, 1.0vw, 12px);
            letter-spacing: 3px;
            color: rgba(158, 143, 122, 0.60);
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
            transition: color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        #select-back:hover { color: #c9a84c; }
    </style>
</head>
<body>

<!-- ========== TOP 画面 ========== -->
<div id="screen-top" class="screen">
    <div id="top-wrap">
        <picture>
            <source media="(max-width: 767px)" srcset="/erotic-lion/img/TOP_mob.webp">
            <img id="top-img" src="/erotic-lion/img/TOP.webp" alt="The Dark Carnival">
        </picture>
        <div id="top-overlay">
            <!-- 画像内の START THE SHOW サインに重ねる透明クリック領域 -->
            <button id="btn-start" onclick="goToPw()" aria-label="Start the Show"></button>
            <div id="top-quit" onclick="handleQuit()">Quit</div>
        </div>
    </div>
</div>

<!-- ========== パスワード画面 ========== -->
<div id="screen-pw" class="screen">
    <div id="pw-wrap">
        <picture>
            <source media="(max-width: 767px)" srcset="/erotic-lion/img/pass_mob.webp">
            <img id="pw-img" src="/erotic-lion/img/2.key.webp" alt="">
        </picture>
        <div id="pw-overlay">
            <!-- パスワード入力（画像のダイヤル表示エリアに重ねる） -->
            <input
                id="pw-input"
                type="password"
                inputmode="numeric"
                maxlength="4"
                autocomplete="off"
                oninput="updateDots()"
                onkeydown="if(event.key==='Enter') handleEnter()"
            />
            <p id="pw-error"></p>
            <!-- ENTER ボタン -->
            <button id="btn-enter" onclick="handleEnter()" aria-label="Enter"></button>
            <!-- CANCEL ボタン -->
            <button id="btn-cancel" onclick="showScreen('top')" aria-label="Cancel"></button>
        </div>
    </div>
</div>

<!-- ========== ゲーム選択画面 ========== -->
<div id="screen-select" class="screen">
    <div id="select-wrap">

        <!-- 背景画像（アスペクト比を保ちながら幅 100% に拡縮） -->
        <img id="select-img" src="/erotic-lion/img/3.select.webp" alt="Select Your Curious Encounter">

        <!-- 全体暗化レイヤー（フレーム外の余計な文字を抑える） -->
        <div id="select-dim"></div>

        <!-- カードオーバーレイ -->
        <div id="select-cards">

            <!-- カード1 (左上): 尻叩き -->
            <a href="./games/hip.html" class="gcard" id="gcard-1">
                <div class="gcard-inner">
                    <h3 class="gcard-title">尻叩き</h3>
                    <p class="gcard-desc">傲慢な女の尻を叩いて調教しよう</p>
                </div>
            </a>

            <!-- カード2 (右上): 淫らな尻取り -->
            <a href="./games/erotic-word-chain.html" class="gcard" id="gcard-2">
                <div class="gcard-inner">
                    <h3 class="gcard-title">淫らな尻取り</h3>
                    <p class="gcard-desc">エロス溢れるAIしりとりゲームを体感しよう</p>
                </div>
            </a>

            <!-- カード3 (左下): 陰毛だぁ～ゲーム -->
            <a href="./games/Inmouder.html" class="gcard" id="gcard-3">
                <div class="gcard-inner">
                    <h3 class="gcard-title">陰毛だぁ～ゲーム</h3>
                    <p class="gcard-desc">陰毛に塗れながらも発射しよう</p>
                </div>
            </a>

            <!-- カード4 (右下): Coming Soon -->
            <div class="gcard gcard-soon" id="gcard-4">
                <div class="gcard-inner">
                    <div class="gcard-coming-header">
                        <span class="gcard-lock">🔒</span>
                        <span>Coming Soon</span>
                        <span class="gcard-lock">🔒</span>
                    </div>
                    <p class="gcard-desc gcard-desc-muted">Psycho Loop<br>終わらない夜。繰り返される悦びの渦に沈め。</p>
                </div>
            </div>

            <!-- 入口に戻るリンク -->
            <div id="select-back" onclick="showScreen('top')">← Back to Entrance</div>

        </div><!-- /#select-cards -->
    </div><!-- /#select-wrap -->
</div>

<script>
    // ── 画面切り替え ──
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
    }

    // ── パスワード入力時のエラークリア ──
    function updateDots() {
        document.getElementById('pw-error').textContent = '';
    }

    // ── 認証処理 ──
    function handleEnter() {
        const input = document.getElementById('pw-input');
        if (input.value === '1060') {
            sessionStorage.setItem('portal_unlocked', '1');
            input.value = '';
            updateDots();
            showScreen('select');
        } else {
            document.getElementById('pw-error').textContent = 'The key is wrong.';
            input.classList.remove('shake');
            void input.offsetWidth;
            input.classList.add('shake');
            input.value = '';
            updateDots();
        }
    }

    // ── TOP → PW ──
    function goToPw() {
        document.getElementById('pw-input').value = '';
        updateDots();
        document.getElementById('pw-error').textContent = '';
        showScreen('pw');
        setTimeout(() => document.getElementById('pw-input').focus(), 500);
    }

    // ── QUIT ──
    function handleQuit() {
        if (!window.close()) {
            document.querySelector('#top-ui').innerHTML =
                '<p style="font-family:Cinzel,serif;font-size:0.75rem;letter-spacing:4px;color:#9e8f7a;text-transform:uppercase;">The show must go on...</p>';
        }
    }

    // ── 2・3 枚目の画像を遅延プリロード ──
    function preloadImages() {
        ['/erotic-lion/img/2.key.webp', '/erotic-lion/img/3.select.webp'].forEach(src => {
            const img = new Image();
            img.src = src;
        });
    }

    // ── 初期化 ──
    window.addEventListener('DOMContentLoaded', () => {
        if (sessionStorage.getItem('portal_unlocked') === '1') {
            showScreen('select');
        } else {
            showScreen('top');
        }
        setTimeout(preloadImages, 800);
    });
</script>

</body>
</html>
