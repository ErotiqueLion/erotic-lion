<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Gift from the Erotic Lion — The Dark Carnival</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <!-- 最初の画像を優先プリロード -->
    <link rel="preload" as="image" href="/erotic-lion/img/1.Opening.webp">
    <style>
        :root {
            --bg:      #0d0008;
            --main:    #8b0000;
            --accent:  #c9a84c;
            --text:    #f0e6d3;
            --subtext: #9e8f7a;
            --border:  #3a1a1a;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Noto Serif JP', Georgia, serif;
            color: var(--text);
        }

        /* ── 共通スクリーン ── */
        .screen {
            position: fixed;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.9s ease;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 8vh;
        }
        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        /* 暗化オーバーレイ（TOP・PW のみ） */
        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(13, 0, 8, 0.45);
            pointer-events: none;
        }
        .screen > * { position: relative; z-index: 1; }

        /* ── TOP 画面 ── */
        #screen-top {
            background-image: url('/erotic-lion/img/1.Opening.webp');
            justify-content: flex-end;
        }

        /* ── パスワード画面 ── */
        #screen-pw {
            background-image: url('/erotic-lion/img/2.key.webp');
            justify-content: center;
        }

        /* ── ゲーム選択画面 ──
           img タグで背景を管理するため background-image は使わない */
        #screen-select {
            background-image: none;
            justify-content: flex-start;
            align-items: flex-start;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0;
        }
        /* 選択画面は img で暗化を管理するので ::before 不要 */
        #screen-select::before { display: none; }

        /* 画像全体に薄い暗化レイヤー（フレーム外の文字・装飾を抑える） */
        #select-dim {
            position: absolute;
            inset: 0;
            background: rgba(5, 2, 1, 0.45);
            pointer-events: none;
            z-index: 1;
        }

        /* カードはdimの上に表示 */
        .gcard, #select-back {
            z-index: 2;
        }

        /* ── ボタン共通 ── */
        .btn-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            padding: 14px 32px;
            min-height: 48px;
            border: 1px solid var(--accent);
            background: rgba(13, 0, 8, 0.7);
            color: var(--accent);
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover {
            background: var(--accent);
            color: var(--bg);
        }
        .btn.secondary {
            border-color: rgba(201,168,76,0.4);
            color: var(--subtext);
        }
        .btn.secondary:hover {
            background: rgba(201,168,76,0.15);
            color: var(--text);
        }

        /* ── TOP 画面内UI ── */
        #top-ui {
            text-align: center;
            padding-bottom: 6vh;
        }

        /* ── パスワード画面内UI ── */
        #pw-ui {
            text-align: center;
            background: rgba(13, 0, 8, 0.75);
            border: 1px solid var(--border);
            padding: 36px 40px;
            max-width: 360px;
            width: 90%;
        }
        #pw-ui .pw-title {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 6px;
            color: var(--subtext);
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        #pw-ui .pw-dial {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .pw-dot {
            width: 18px;
            height: 18px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            background: transparent;
            transition: background 0.2s;
        }
        .pw-dot.filled { background: var(--accent); }
        #pw-input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-bottom: 1px solid var(--accent);
            color: transparent;
            caret-color: var(--accent);
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            letter-spacing: 12px;
            text-align: center;
            padding: 10px;
            outline: none;
            margin-bottom: 8px;
        }
        #pw-input:focus { border-bottom-color: #e8c76a; }
        #pw-error {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: #c0392b;
            min-height: 1.2em;
            margin-bottom: 20px;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.45s ease; }

        /* ════════════════════════════════════════
           ゲーム選択画面 — img + オーバーレイ方式
           ════════════════════════════════════════ */

        /* 画像とカードを包むコンテナ */
        #select-wrap {
            position: relative;
            width: 100%;
            flex-shrink: 0;
        }

        /* 背景画像（アスペクト比を維持するため img タグ） */
        #select-img {
            display: block;
            width: 100%;
            height: auto;
        }

        /* カードオーバーレイ全体 */
        #select-cards {
            position: absolute;
            inset: 0;
        }

        /* 個別カード共通 */
        .gcard {
            position: absolute;
            display: flex;
            align-items: stretch;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            /* フレームの角丸に合わせる（画像の丸み ≈ 1.5% of card width） */
            border-radius: 0.8%;
        }

        /* カード位置（原画像 2760x1504 の赤枠実測値から算出） */
        #gcard-1 { top: 35.3%; left: 31.3%; width: 19.9%; height: 23.6%; }
        #gcard-2 { top: 35.1%; left: 55.2%; width: 19.5%; height: 23.6%; }
        #gcard-3 { top: 65.0%; left: 30.8%; width: 20.2%; height: 28.4%; }
        #gcard-4 { top: 64.8%; left: 55.0%; width: 21.6%; height: 28.9%; }

        /* カード内側（画像のプレースホルダーを完全に隠す） */
        .gcard-inner {
            width: 100%;
            height: 100%;
            background: rgba(8, 3, 1, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 7% 9%;
            transition: background 0.3s;
        }

        .gcard:hover .gcard-inner {
            background: rgba(22, 8, 2, 0.82);
        }

        /* 3サークル（画像のデザインに合わせた淡いアウトライン） */
        .gcard-circles {
            display: flex;
            gap: 8%;
            margin-bottom: 7%;
            width: 58%;
            justify-content: center;
            flex-shrink: 0;
        }

        .gcircle {
            width: 26%;
            aspect-ratio: 1 / 1;
            border: 1px solid rgba(241, 222, 178, 0.50);
            border-radius: 50%;
            background: rgba(241, 222, 178, 0.06);
            flex-shrink: 0;
            /* 内側グロー */
            box-shadow: inset 0 0 4px rgba(241, 222, 178, 0.12);
        }

        /* ホバー時にサークルを少し明るく */
        .gcard:hover .gcircle {
            border-color: rgba(241, 222, 178, 0.75);
            box-shadow: inset 0 0 6px rgba(241, 222, 178, 0.22),
                        0 0 8px rgba(201, 168, 76, 0.20);
        }

        /* ゲームタイトル */
        .gcard-title {
            font-family: 'Cinzel', serif;
            /* vw ベースで画像スケールに追従、最小・最大でクランプ */
            font-size: clamp(8px, 1.7vw, 20px);
            font-weight: 700;
            color: #f1deb2;
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 5%;
            line-height: 1.3;
            flex-shrink: 0;
        }

        .gcard:hover .gcard-title {
            color: #fff8e8;
        }

        /* 説明文 */
        .gcard-desc {
            font-family: 'Noto Serif JP', Georgia, serif;
            font-size: clamp(7px, 1.25vw, 14px);
            color: #b89a6a;
            text-align: center;
            line-height: 1.65;
            margin: 0;
        }

        /* Coming Soon カード */
        .gcard-soon {
            cursor: default;
            pointer-events: none;
        }

        .gcard-coming-header {
            display: flex;
            align-items: center;
            gap: 5%;
            margin-bottom: 7%;
            font-family: 'Cinzel', serif;
            font-size: clamp(7px, 1.5vw, 17px);
            color: #7a6040;
            letter-spacing: 0.08em;
            flex-shrink: 0;
        }

        .gcard-lock {
            font-size: 0.88em;
            opacity: 0.65;
        }

        .gcard-desc-muted {
            color: #4a3820;
        }

        /* 戻るリンク */
        #select-back {
            position: absolute;
            /* 画像下端のわずか上に配置 */
            bottom: 1.5%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cinzel', serif;
            font-size: clamp(7px, 1.0vw, 12px);
            letter-spacing: 3px;
            color: rgba(158, 143, 122, 0.60);
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
            transition: color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        #select-back:hover { color: #c9a84c; }
    </style>
</head>
<body>

<!-- ========== TOP 画面 ========== -->
<div id="screen-top" class="screen">
    <div id="top-ui">
        <div class="btn-row">
            <button class="btn" onclick="goToPw()">Start the Show</button>
            <button class="btn secondary" onclick="handleQuit()">Quit</button>
        </div>
    </div>
</div>

<!-- ========== パスワード画面 ========== -->
<div id="screen-pw" class="screen">
    <div id="pw-ui">
        <p class="pw-title">秘密の鍵 (Password) Required</p>
        <div class="pw-dial">
            <span class="pw-dot" id="dot0"></span>
            <span class="pw-dot" id="dot1"></span>
            <span class="pw-dot" id="dot2"></span>
            <span class="pw-dot" id="dot3"></span>
        </div>
        <input
            id="pw-input"
            type="password"
            inputmode="numeric"
            maxlength="4"
            autocomplete="off"
            oninput="updateDots()"
            onkeydown="if(event.key==='Enter') handleEnter()"
        />
        <p id="pw-error"></p>
        <div class="btn-row">
            <button class="btn" onclick="handleEnter()">Enter</button>
            <button class="btn secondary" onclick="showScreen('top')">Cancel</button>
        </div>
    </div>
</div>

<!-- ========== ゲーム選択画面 ========== -->
<div id="screen-select" class="screen">
    <div id="select-wrap">

        <!-- 背景画像（アスペクト比を保ちながら幅 100% に拡縮） -->
        <img id="select-img" src="/erotic-lion/img/3.select.webp" alt="Select Your Curious Encounter">

        <!-- 全体暗化レイヤー（フレーム外の余計な文字を抑える） -->
        <div id="select-dim"></div>

        <!-- カードオーバーレイ -->
        <div id="select-cards">

            <!-- カード1: 陰毛だーゲーム -->
            <a href="./games/Inmouder.html" class="gcard" id="gcard-1">
                <div class="gcard-inner">
                    <div class="gcard-circles">
                        <span class="gcircle"></span>
                        <span class="gcircle"></span>
                        <span class="gcircle"></span>
                    </div>
                    <h3 class="gcard-title">陰毛だーゲーム</h3>
                    <p class="gcard-desc">深淵から忍び寄る快楽。<br>禁忌の快感を暴き出せ。</p>
                </div>
            </a>

            <!-- カード2: HIP -->
            <a href="./games/hip.html" class="gcard" id="gcard-2">
                <div class="gcard-inner">
                    <div class="gcard-circles">
                        <span class="gcircle"></span>
                        <span class="gcircle"></span>
                        <span class="gcircle"></span>
                    </div>
                    <h3 class="gcard-title">HIP</h3>
                    <p class="gcard-desc">視線を奪う曲線美。<br>揺れる衝動に身を任せろ。</p>
                </div>
            </a>

            <!-- カード3: Erotic Word Chain -->
            <a href="./games/erotic-word-chain.html" class="gcard" id="gcard-3">
                <div class="gcard-inner">
                    <div class="gcard-circles">
                        <span class="gcircle"></span>
                        <span class="gcircle"></span>
                        <span class="gcircle"></span>
                    </div>
                    <h3 class="gcard-title">Erotic Word Chain</h3>
                    <p class="gcard-desc">野生の舌と淫らな言葉。<br>AIとのしりとりで堕ちよ。</p>
                </div>
            </a>

            <!-- カード4: Coming Soon (Psycho Loop) -->
            <div class="gcard gcard-soon" id="gcard-4">
                <div class="gcard-inner">
                    <div class="gcard-coming-header">
                        <span class="gcard-lock">🔒</span>
                        <span>Coming Soon</span>
                        <span class="gcard-lock">🔒</span>
                    </div>
                    <p class="gcard-desc gcard-desc-muted">Psycho Loop<br>終わらない夜。繰り返される悦びの渦に沈め。</p>
                </div>
            </div>

            <!-- 入口に戻るリンク -->
            <div id="select-back" onclick="showScreen('top')">← Back to Entrance</div>

        </div><!-- /#select-cards -->
    </div><!-- /#select-wrap -->
</div>

<script>
    // ── 画面切り替え ──
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
    }

    // ── パスワード入力のダイヤル更新 ──
    function updateDots() {
        const len = document.getElementById('pw-input').value.length;
        for (let i = 0; i < 4; i++) {
            document.getElementById('dot' + i).classList.toggle('filled', i < len);
        }
        document.getElementById('pw-error').textContent = '';
    }

    // ── 認証処理 ──
    function handleEnter() {
        const input = document.getElementById('pw-input');
        if (input.value === '1060') {
            sessionStorage.setItem('portal_unlocked', '1');
            input.value = '';
            updateDots();
            showScreen('select');
        } else {
            document.getElementById('pw-error').textContent = 'The key is wrong.';
            input.classList.remove('shake');
            void input.offsetWidth;
            input.classList.add('shake');
            input.value = '';
            updateDots();
        }
    }

    // ── TOP → PW ──
    function goToPw() {
        document.getElementById('pw-input').value = '';
        updateDots();
        document.getElementById('pw-error').textContent = '';
        showScreen('pw');
        setTimeout(() => document.getElementById('pw-input').focus(), 500);
    }

    // ── QUIT ──
    function handleQuit() {
        if (!window.close()) {
            document.querySelector('#top-ui').innerHTML =
                '<p style="font-family:Cinzel,serif;font-size:0.75rem;letter-spacing:4px;color:#9e8f7a;text-transform:uppercase;">The show must go on...</p>';
        }
    }

    // ── 2・3 枚目の画像を遅延プリロード ──
    function preloadImages() {
        ['/erotic-lion/img/2.key.webp', '/erotic-lion/img/3.select.webp'].forEach(src => {
            const img = new Image();
            img.src = src;
        });
    }

    // ── 初期化 ──
    window.addEventListener('DOMContentLoaded', () => {
        if (sessionStorage.getItem('portal_unlocked') === '1') {
            showScreen('select');
        } else {
            showScreen('top');
        }
        setTimeout(preloadImages, 800);
    });
</script>

</body>
</html>
