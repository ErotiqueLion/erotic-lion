<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Gift from the Erotic Lion — The Dark Carnival</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <!-- 最初の画像を優先プリロード -->
    <link rel="preload" as="image" href="/erotic-lion/img/1.Opening.png">
    <style>
        :root {
            --bg:      #0d0008;
            --main:    #8b0000;
            --accent:  #c9a84c;
            --text:    #f0e6d3;
            --subtext: #9e8f7a;
            --border:  #3a1a1a;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Noto Serif JP', Georgia, serif;
            color: var(--text);
        }

        /* ── 共通スクリーン ── */
        .screen {
            position: fixed;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.9s ease;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 8vh;
        }
        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        /* 暗化オーバーレイ */
        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(13, 0, 8, 0.45);
            pointer-events: none;
        }
        .screen > * { position: relative; z-index: 1; }

        /* ── TOP 画面 (#screen-top) ── */
        #screen-top {
            background-image: url('/erotic-lion/img/1.Opening.png');
            justify-content: flex-end;
        }

        /* ── パスワード画面 (#screen-pw) ── */
        #screen-pw {
            background-image: url('/erotic-lion/img/2.key.png');
            justify-content: center;
        }

        /* ── ゲーム選択画面 (#screen-select) ── */
        #screen-select {
            background-image: url('/erotic-lion/img/3.select.png');
            justify-content: center;
            overflow-y: auto;
            padding: 5vh 0 5vh;
        }

        /* ── ボタン共通 ── */
        .btn-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            padding: 12px 32px;
            border: 1px solid var(--accent);
            background: rgba(13, 0, 8, 0.7);
            color: var(--accent);
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
            user-select: none;
        }
        .btn:hover {
            background: var(--accent);
            color: var(--bg);
        }
        .btn.secondary {
            border-color: rgba(201,168,76,0.4);
            color: var(--subtext);
        }
        .btn.secondary:hover {
            background: rgba(201,168,76,0.15);
            color: var(--text);
        }

        /* ── TOP 画面内UI ── */
        #top-ui {
            text-align: center;
            padding-bottom: 6vh;
        }

        /* ── パスワード画面内UI ── */
        #pw-ui {
            text-align: center;
            background: rgba(13, 0, 8, 0.75);
            border: 1px solid var(--border);
            padding: 36px 40px;
            max-width: 360px;
            width: 90%;
        }
        #pw-ui .pw-title {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 6px;
            color: var(--subtext);
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        #pw-ui .pw-dial {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        /* ダイヤル風の入力ドット */
        .pw-dot {
            width: 18px;
            height: 18px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            background: transparent;
            transition: background 0.2s;
        }
        .pw-dot.filled {
            background: var(--accent);
        }
        #pw-input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-bottom: 1px solid var(--accent);
            color: var(--text);
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            letter-spacing: 12px;
            text-align: center;
            padding: 10px;
            outline: none;
            margin-bottom: 8px;
            -webkit-text-security: disc;
        }
        #pw-input:focus {
            border-bottom-color: #e8c76a;
        }
        #pw-error {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: #c0392b;
            min-height: 1.2em;
            margin-bottom: 20px;
        }
        /* シェイクアニメーション */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.45s ease; }

        /* ── ゲーム選択画面内UI ── */
        #select-ui {
            width: 90%;
            max-width: 840px;
        }
        #select-ui .select-title {
            text-align: center;
            margin-bottom: 24px;
        }
        #select-ui .select-title h2 {
            font-family: 'Cinzel', serif;
            font-size: clamp(1rem, 3vw, 1.6rem);
            font-weight: 900;
            color: var(--text);
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(201,168,76,0.3);
        }
        #select-ui .select-title p {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 6px;
            color: var(--subtext);
            text-transform: uppercase;
            margin-top: 6px;
        }
        /* 金色区切り線 */
        .divider {
            width: 160px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 14px auto 28px;
        }

        /* カードグリッド */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        @media (max-width: 520px) {
            .card-grid { grid-template-columns: 1fr; }
        }

        /* カード */
        .card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: rgba(13, 0, 8, 0.78);
            border: 1px solid var(--border);
            position: relative;
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.3s;
            overflow: hidden;
        }
        /* 四隅の金装飾 */
        .card::before, .card::after {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0.4;
            transition: opacity 0.3s;
            z-index: 2;
            pointer-events: none;
        }
        .card::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
        .card::after  { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(201,168,76,0.5);
            box-shadow: 0 12px 36px rgba(139,0,0,0.5), 0 0 20px rgba(201,168,76,0.06);
        }
        .card:hover::before, .card:hover::after { opacity: 1; }

        /* サムネイル（幕風） */
        .thumb {
            width: 100%;
            aspect-ratio: 16/8;
            background: linear-gradient(160deg, #280010 0%, #6b0000 55%, #180008 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        /* 幕の縦ストライプ */
        .thumb::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                rgba(0,0,0,0) 0px, rgba(0,0,0,0) 26px,
                rgba(0,0,0,0.18) 26px, rgba(0,0,0,0.18) 30px
            );
        }
        /* ホバーで幕上端に光 */
        .thumb::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .card:hover .thumb::after { opacity: 0.8; }
        .thumb-icon {
            font-size: 2.8rem;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.9));
            transition: transform 0.35s;
        }
        .card:hover .thumb-icon { transform: scale(1.08); }

        /* カード本文 */
        .info {
            padding: 16px 18px 18px;
            border-top: 1px solid var(--border);
        }
        .info h3 {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .info p {
            font-size: 0.72rem;
            color: var(--subtext);
            line-height: 1.7;
            margin-bottom: 12px;
        }
        .info .enter-btn {
            display: inline-block;
            padding: 5px 16px;
            border: 1px solid rgba(201,168,76,0.45);
            color: var(--accent);
            font-family: 'Cinzel', serif;
            font-size: 0.62rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        .card:hover .enter-btn {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        /* Coming Soon カード */
        .card.soon {
            opacity: 0.35;
            pointer-events: none;
        }

        /* 戻るリンク */
        #back-link {
            text-align: center;
            margin-top: 20px;
        }
        #back-link a {
            font-family: 'Cinzel', serif;
            font-size: 0.62rem;
            letter-spacing: 4px;
            color: var(--subtext);
            text-decoration: none;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.3s;
        }
        #back-link a:hover { color: var(--accent); }
    </style>
</head>
<body>

<!-- ========== TOP 画面 ========== -->
<div id="screen-top" class="screen">
    <div id="top-ui">
        <div class="btn-row">
            <button class="btn" onclick="goToPw()">Start the Show</button>
            <button class="btn secondary" onclick="handleQuit()">Quit</button>
        </div>
    </div>
</div>

<!-- ========== パスワード画面 ========== -->
<div id="screen-pw" class="screen">
    <div id="pw-ui">
        <p class="pw-title">秘密の鍵 (Password) Required</p>
        <!-- ダイヤル風ドット表示 -->
        <div class="pw-dial">
            <span class="pw-dot" id="dot0"></span>
            <span class="pw-dot" id="dot1"></span>
            <span class="pw-dot" id="dot2"></span>
            <span class="pw-dot" id="dot3"></span>
        </div>
        <input
            id="pw-input"
            type="password"
            inputmode="numeric"
            maxlength="4"
            autocomplete="off"
            oninput="updateDots()"
            onkeydown="if(event.key==='Enter') handleEnter()"
        />
        <p id="pw-error"></p>
        <div class="btn-row">
            <button class="btn" onclick="handleEnter()">Enter</button>
            <button class="btn secondary" onclick="showScreen('top')">Cancel</button>
        </div>
    </div>
</div>

<!-- ========== ゲーム選択画面 ========== -->
<div id="screen-select" class="screen">
    <div id="select-ui">
        <div class="select-title">
            <h2>Select Your Curious Encounter</h2>
            <p>Choose with care</p>
            <div class="divider"></div>
        </div>

        <div class="card-grid">
            <!-- 陰毛だーゲーム -->
            <a href="./games/Inmouder.html" class="card">
                <div class="thumb">
                    <span class="thumb-icon">🖤</span>
                </div>
                <div class="info">
                    <h3>陰毛だーゲーム</h3>
                    <p>深淵から忍び寄る快楽。闇の中に隠された禁忌の快感を暴き出せ。</p>
                    <span class="enter-btn">Enter</span>
                </div>
            </a>

            <!-- HIP -->
            <a href="./games/hip.html" class="card">
                <div class="thumb">
                    <span class="thumb-icon">🍑</span>
                </div>
                <div class="info">
                    <h3>HIP</h3>
                    <p>視線を奪う曲線美。揺れる衝動に身を任せる、禁断の快楽。</p>
                    <span class="enter-btn">Enter</span>
                </div>
            </a>

            <!-- Erotic Word Chain -->
            <a href="./games/erotic-word-chain.html" class="card">
                <div class="thumb" style="background: linear-gradient(160deg, #1a0008 0%, #8b0000 40%, #4a0030 100%);">
                    <span class="thumb-icon">🦁</span>
                </div>
                <div class="info">
                    <h3>Erotic Word Chain</h3>
                    <p>野生の舌と淫らな言葉の応酬。AIとのしりとりで欲情度を高めよ。</p>
                    <span class="enter-btn">Enter</span>
                </div>
            </a>

            <!-- Psycho Loop (Coming Soon) -->
            <div class="card soon">
                <div class="thumb" style="background: linear-gradient(160deg, #08001a 0%, #2a0055 55%, #080010 100%);">
                    <span class="thumb-icon">🌀</span>
                </div>
                <div class="info">
                    <h3>Psycho Loop</h3>
                    <p>終わらない夜。繰り返される悦びの渦に沈め。</p>
                    <span class="enter-btn">Coming Soon</span>
                </div>
            </div>
        </div>

        <div id="back-link">
            <a onclick="showScreen('top')">← Back to Entrance</a>
        </div>
    </div>
</div>

<script>
    // ── 画面切り替え ──
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
    }

    // ── パスワード入力のダイヤル更新 ──
    function updateDots() {
        const len = document.getElementById('pw-input').value.length;
        for (let i = 0; i < 4; i++) {
            document.getElementById('dot' + i).classList.toggle('filled', i < len);
        }
        // エラーをクリア
        document.getElementById('pw-error').textContent = '';
    }

    // ── 認証処理 ──
    function handleEnter() {
        const input = document.getElementById('pw-input');
        if (input.value === '1060') {
            sessionStorage.setItem('portal_unlocked', '1');
            input.value = '';
            updateDots();
            showScreen('select');
        } else {
            document.getElementById('pw-error').textContent = 'The key is wrong.';
            input.classList.remove('shake');
            // リフロー強制でアニメーションをリセット
            void input.offsetWidth;
            input.classList.add('shake');
            input.value = '';
            updateDots();
        }
    }

    // ── TOP → PW ──
    function goToPw() {
        document.getElementById('pw-input').value = '';
        updateDots();
        document.getElementById('pw-error').textContent = '';
        showScreen('pw');
        // フォーカスを少し遅らせてフェード後に合わせる
        setTimeout(() => document.getElementById('pw-input').focus(), 500);
    }

    // ── QUIT ──
    function handleQuit() {
        // モダンブラウザはスクリプトからのタブ閉じを制限するため、メッセージを表示
        if (!window.close()) {
            document.querySelector('#top-ui').innerHTML =
                '<p style="font-family:Cinzel,serif;font-size:0.75rem;letter-spacing:4px;color:#9e8f7a;text-transform:uppercase;">The show must go on...</p>';
        }
    }

    // ── 2番目・3番目の画像を遅延プリロード ──
    function preloadImages() {
        ['/erotic-lion/img/2.key.png', '/erotic-lion/img/3.select.png'].forEach(src => {
            const img = new Image();
            img.src = src;
        });
    }

    // ── 初期化 ──
    window.addEventListener('DOMContentLoaded', () => {
        // セッション認証済みなら選択画面へ直行
        if (sessionStorage.getItem('portal_unlocked') === '1') {
            showScreen('select');
        } else {
            showScreen('top');
        }
        // 2・3枚目の画像を遅延プリロード
        setTimeout(preloadImages, 800);
    });
</script>

</body>
</html>
