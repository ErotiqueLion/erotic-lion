<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Gift from the Erotic Lion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #0d0008;
            --main:    #8b0000;
            --accent:  #c9a84c;
            --text:    #f0e6d3;
            --subtext: #9e8f7a;
            --border:  #3a1a1a;
            --card-bg: #100008;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            background: var(--bg);
            scroll-behavior: smooth;
        }

        body {
            color: var(--text);
            font-family: 'Noto Serif JP', Georgia, serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景ノイズテクスチャ */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.035;
            pointer-events: none;
            z-index: 0;
        }

        /* ── ヘッダー ── */
        header {
            text-align: center;
            padding: 80px 20px 64px;
            position: relative;
            z-index: 1;
            border-bottom: 1px solid var(--border);
        }

        .ornament {
            font-family: 'Cinzel', serif;
            color: var(--accent);
            letter-spacing: 12px;
            font-size: 0.7rem;
            opacity: 0.6;
            margin-bottom: 28px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: clamp(1.8rem, 8vw, 4.2rem);
            line-height: 1.15;
            color: var(--text);
            text-shadow: 0 0 60px rgba(201,168,76,0.2);
            letter-spacing: 2px;
        }

        h1 em {
            font-style: normal;
            color: var(--accent);
        }

        .divider {
            width: 180px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 28px auto;
        }

        .tagline {
            font-family: 'Cinzel', serif;
            font-size: 0.68rem;
            letter-spacing: 8px;
            color: var(--subtext);
            text-transform: uppercase;
        }

        /* ── ゲームグリッド ── */
        main {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
            padding: 64px 40px 80px;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ── カード ── */
        .card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: var(--card-bg);
            border: 1px solid var(--border);
            position: relative;
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.3s ease;
            overflow: hidden;
        }

        /* 四隅の金装飾 */
        .card::before,
        .card::after {
            content: "";
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0.5;
            transition: opacity 0.3s;
            z-index: 2;
            pointer-events: none;
        }
        .card::before { top: 7px; left: 7px;  border-width: 1px 0 0 1px; }
        .card::after  { bottom: 7px; right: 7px; border-width: 0 1px 1px 0; }

        .card:hover {
            transform: translateY(-7px);
            border-color: rgba(201,168,76,0.5);
            box-shadow:
                0 16px 48px rgba(139,0,0,0.45),
                0 0 24px rgba(201,168,76,0.08);
        }

        .card:hover::before,
        .card:hover::after { opacity: 1; }

        /* サムネイル（幕風） */
        .thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(160deg, #280010 0%, #6b0000 55%, #180008 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 幕の縦ストライプ */
        .thumb::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                rgba(0,0,0,0) 0px,
                rgba(0,0,0,0) 26px,
                rgba(0,0,0,0.18) 26px,
                rgba(0,0,0,0.18) 30px
            );
        }

        /* ホバーで幕上端に光 */
        .thumb::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .card:hover .thumb::after { opacity: 0.8; }

        .thumb-icon {
            font-size: 3.6rem;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 4px 16px rgba(0,0,0,0.9));
            transition: transform 0.35s ease;
        }

        .card:hover .thumb-icon { transform: scale(1.08); }

        /* カード本文 */
        .info {
            padding: 20px 22px 24px;
            border-top: 1px solid var(--border);
        }

        .info h2 {
            font-family: 'Cinzel', serif;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .info p {
            font-size: 0.8rem;
            color: var(--subtext);
            line-height: 1.8;
            margin-bottom: 18px;
        }

        .btn {
            display: inline-block;
            padding: 7px 20px;
            border: 1px solid rgba(201,168,76,0.5);
            color: var(--accent);
            font-family: 'Cinzel', serif;
            font-size: 0.68rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }

        .card:hover .btn {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        /* 未実装カード */
        .card.soon {
            opacity: 0.38;
            pointer-events: none;
        }

        /* ── フッター ── */
        footer {
            border-top: 1px solid var(--border);
            text-align: center;
            padding: 36px 20px;
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 6px;
            color: var(--subtext);
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        /* スマホ対応 */
        @media (max-width: 600px) {
            header { padding: 56px 20px 48px; }
            main { padding: 40px 20px 60px; gap: 20px; }
            h1 { letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <header>
        <p class="ornament">✦ &nbsp; ✦ &nbsp; ✦</p>
        <h1>A GIFT FROM THE<br><em>EROTIC LION</em></h1>
        <div class="divider"></div>
        <p class="tagline">Wild Psycho Arcade</p>
    </header>

    <main>

        <a href="./games/Inmouder.html" class="card">
            <div class="thumb">
                <span class="thumb-icon">🖤</span>
            </div>
            <div class="info">
                <h2>陰毛だーゲーム</h2>
                <p>深淵から忍び寄る快楽。闇の中に隠された禁忌の快感を暴き出せ。</p>
                <span class="btn">Enter</span>
            </div>
        </a>

        <a href="./games/hip.html" class="card">
            <div class="thumb">
                <span class="thumb-icon">🍑</span>
            </div>
            <div class="info">
                <h2>HIP</h2>
                <p>視線を奪う曲線美。揺れる衝動に身を任せる、禁断の快楽。</p>
                <span class="btn">Enter</span>
            </div>
        </a>

        <a href="./games/erotic-word-chain.html" class="card">
            <div class="thumb">
                <span class="thumb-icon">🦁</span>
            </div>
            <div class="info">
                <h2>Erotic Word Chain</h2>
                <p>野生の舌と淫らな言葉の応酬。AIとのしりとりで欲情度を高めよ。</p>
                <span class="btn">Enter</span>
            </div>
        </a>

        <a href="./games/psycho-loop.html" class="card soon">
            <div class="thumb" style="background: linear-gradient(160deg, #08001a 0%, #2a0055 55%, #080010 100%);">
                <span class="thumb-icon">🌀</span>
            </div>
            <div class="info">
                <h2>Psycho Loop</h2>
                <p>終わらない夜。繰り返される悦びの渦に沈め。（近日公開）</p>
                <span class="btn">Coming Soon</span>
            </div>
        </a>

    </main>

    <footer>Stay Wild, Stay Erotic.</footer>

</body>
</html>
