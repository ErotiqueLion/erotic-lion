name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install
      - run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/games/lion-heart

          # ポータル index.html を配置
          cp _portal/index.html _deploy/index.html

          # 他ゲームの HTML を配置（_portal/games/ に置いたファイルをコピー）
          if [ -d _portal/games ]; then
            cp -r _portal/games/. _deploy/games/
          fi

          # Vite ビルドを games/lion-heart/ に配置
          cp -r dist/. _deploy/games/lion-heart/

          # games/lion-heart.html → games/lion-heart/ へのリダイレクト
          cat > _deploy/games/lion-heart.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=./lion-heart/">
          </head>
          <body>
            <script>location.replace('./lion-heart/');</script>
          </body>
          </html>
          EOF

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
