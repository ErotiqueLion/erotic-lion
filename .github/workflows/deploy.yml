name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # EroticWordChain（安定版）ビルド
      - run: npm install
      - run: npm run build

      # EroticWordChain 改（kuroshiro版）ビルド
      - run: npm install
        working-directory: kai
      - run: npm run build
        working-directory: kai

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/games/erotic-word-chain
          mkdir -p _deploy/games/erotic-word-chain-kai

          # ポータル index.html を配置
          cp _portal/index.html _deploy/index.html

          # 他ゲームの HTML を配置（_portal/games/ に置いたファイルをコピー）
          if [ -d _portal/games ]; then
            cp -r _portal/games/. _deploy/games/
          fi

          # Vite ビルドを games/erotic-word-chain/ に配置
          cp -r dist/. _deploy/games/erotic-word-chain/

          # 改ビルドを games/erotic-word-chain-kai/ に配置
          cp -r kai/dist/. _deploy/games/erotic-word-chain-kai/

          # games/erotic-word-chain.html → games/erotic-word-chain/ へのリダイレクト
          cat > _deploy/games/erotic-word-chain.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=./erotic-word-chain/">
          </head>
          <body>
            <script>location.replace('./erotic-word-chain/');</script>
          </body>
          </html>
          EOF

          # games/erotic-word-chain-kai.html → games/erotic-word-chain-kai/ へのリダイレクト
          cat > _deploy/games/erotic-word-chain-kai.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=./erotic-word-chain-kai/">
          </head>
          <body>
            <script>location.replace('./erotic-word-chain-kai/');</script>
          </body>
          </html>
          EOF

      - uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: ErotiqueLion/erotic-lion
          publish_branch: gh-pages
          publish_dir: ./_deploy
